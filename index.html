  <script>
    // ── LIGHT THEME RUNTIME ENFORCER ──
    // Inline style="background:#0a0c11" gibi koyu renkleri DOM'da beyaza çevirir.
    // CSS attribute selector React inline style'ları (rgb formatına dönüştürülmüş) için yetersiz kaldığından
    // bu walker tüm element'leri kontrol edip koyu arka planları override eder.
    (function () {
      const DARK_LUM = 90;     // 0–255: bunun altı koyu sayılır
      const LIGHT_TEXT_LUM = 200; // 0–255: bunun üstü açık metin sayılır
      const parseRgb = (s) => {
        const m = s && s.match(/rgba?\((\d+)[,\s]+(\d+)[,\s]+(\d+)(?:[,\s]+([\d.]+))?\)/);
        return m ? { r: +m[1], g: +m[2], b: +m[3], a: m[4] != null ? +m[4] : 1 } : null;
      };
      const lum = (c) => (c.r + c.g + c.b) / 3;

      const fixEl = (el) => {
        if (!(el instanceof HTMLElement)) return;
        // Inline style varsa kontrol et — computed değil, sadece inline
        const inline = el.getAttribute("style");
        if (inline) {
          // Inline style içinde koyu hex (#0xx, #1xx) varsa background-image'i sıfırla
          if (/#0[0-9a-f]{2}|#1[0-5][0-9a-f]/i.test(inline) && /background/i.test(inline)) {
            el.style.setProperty("background-color", "#ffffff", "important");
            el.style.setProperty("background-image", "none", "important");
          }
          // background / background-color
          const cs = getComputedStyle(el);
          const bg = parseRgb(cs.backgroundColor);
          if (bg && bg.a > 0.5 && lum(bg) < DARK_LUM) {
            el.style.setProperty("background-color", "#ffffff", "important");
            el.style.setProperty("background-image", "none", "important");
          }
          // border colors
          ["borderTopColor", "borderRightColor", "borderBottomColor", "borderLeftColor"].forEach((k) => {
            const bc = parseRgb(cs[k]);
            if (bc && bc.a > 0.3 && lum(bc) < DARK_LUM) {
              el.style.setProperty(k.replace(/([A-Z])/g, "-$1").toLowerCase(), "rgba(15,23,42,.12)", "important");
            }
          });
          // light text on light bg → koyu metin
          const tc = parseRgb(cs.color);
          if (tc && lum(tc) > LIGHT_TEXT_LUM) {
            el.style.setProperty("color", "#0f172a", "important");
          }
        }
      };

      let scheduled = false;
      const sweep = () => {
        scheduled = false;
        document.querySelectorAll("*").forEach(fixEl);
      };
      const schedule = () => {
        if (scheduled) return;
        scheduled = true;
        requestAnimationFrame(sweep);
      };

      const init = () => {
        sweep();
        const obs = new MutationObserver((muts) => {
          for (const m of muts) {
            if (m.type === "attributes" || m.addedNodes.length) { schedule(); break; }
          }
        });
        obs.observe(document.body, { childList: true, subtree: true, attributes: true, attributeFilter: ["style", "class"] });
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
