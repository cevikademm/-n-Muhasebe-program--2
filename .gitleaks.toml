# Gitleaks Configuration for FikoAI
# Sifre, API anahtari ve gizli bilgi tespit kurallari

title = "FikoAI Gitleaks Config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist"
paths = [
    '''node_modules''',
    '''dist''',
    '''\.env\.example''',
    '''package-lock\.json''',
    '''\.gitleaks\.toml''',
]

# Supabase anon key (public, client-side) - bu bilerek acik birakiliyor
# RLS (Row Level Security) ile korunan bir public key'dir
[[rules]]
id = "supabase-anon-key-allowlist"
description = "Allow Supabase anon key (public by design)"
regex = '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9'''
[rules.allowlist]
regexTarget = "match"
regexes = ['''VITE_SUPABASE_ANON_KEY''']
